name: http_request
display_name: HTTP Request
category: web
description: Send an HTTP request to an authorized challenge target.
risk_level: low
enabled: true
parameters:
  method: {type: string, required: true}
  url: {type: string, required: true}
  headers: {type: object, required: false}
  query: {type: object, required: false}
  body: {type: string, required: false}
  follow_redirects: {type: boolean, required: false}
  timeout: {type: integer, required: false}
limits: {timeout_seconds: 30, max_output_bytes: 1048576}
permissions: {target_allowlist_required: true}
