name: pcap_credentials
display_name: PCAP Credential Indicators
category: traffic
description: Extract bounded credential-like protocol indicators from an attached PCAP.
risk_level: medium
enabled: true
parameters: {path: {type: string, required: true}}
limits: {timeout_seconds: 30, max_output_bytes: 131072}
permissions: {pcap_only: true, sensitive_output_redacted: true}
