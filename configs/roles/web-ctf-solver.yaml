name: web-ctf-solver
display_name: Web CTF 解题智能体
version: 2
description: Solver for explicitly authorized CTF Web challenges.
challenge_types: [WEB_TARGET]
enabled: true
tools: [http_request, http_session_request, http_extract, file_read, file_search, python_run, script_run, sandbox_exec, jwt_inspect, js_asset_analyze, source_map_analyze, content_discovery, file_type, strings_extract, archive_list, sqlmap_detect, sql_injection_probe, sql_boolean_compare, sql_union_probe, nmap_service_probe, nikto_scan, binwalk_scan, exiftool_metadata]
skills: [ctf-solver-core, web-ctf-methodology]
limits:
  max_tool_calls: 40
  max_runtime_seconds: 900
system_rules:
  - Only interact with explicitly allowed challenge hosts.
  - Record evidence for every important conclusion.
  - Never claim a flag is solved before verification.
  - Do not use arbitrary shell commands or public targets.
