services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ctf_agent
      MYSQL_USER: ctf_agent
      MYSQL_PASSWORD: ctf_agent
      MYSQL_ROOT_PASSWORD: change-me-before-use
    ports: ["3306:3306"]
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes: ["mysql_data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pchange-me-before-use"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  mysql_data:
